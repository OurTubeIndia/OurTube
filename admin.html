<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurTube - Futuristic Admin 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0f0f; color: #fff; padding-bottom: 50px; overflow-x: hidden; }

        /* === Top Navigation === */
        .top-nav { display: flex; background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 18px; background: none; border: none; color: #888; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav-btn.active { color: #00e676; border-bottom: 3px solid #00e676; background: rgba(0, 230, 118, 0.1); }
        .nav-btn i { margin-right: 8px; }

        /* === Main Containers === */
        .container { padding: 20px; max-width: 800px; margin: 0 auto; display: none; animation: fadeIn 0.4s ease; }
        .container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* === Header & Action === */
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #1e1e1e; padding: 15px 20px; border-radius: 12px; border: 1px solid #333; }
        .header-action h2 { color: #fff; font-size: 18px; }
        .btn-new { background: #00e676; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(0,230,118,0.3); }
        .btn-new:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0,230,118,0.6); }

        /* === List Items === */
        .item-list { display: grid; gap: 15px; }
        .list-item { background: #1e1e1e; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00e676; border-right: 1px solid #333; border-top: 1px solid #333; border-bottom: 1px solid #333; transition: 0.3s; }
        .list-item:hover { background: #252525; transform: translateX(5px); }
        .item-info { flex-grow: 1; margin-right: 15px; overflow: hidden; }
        .item-info h4 { font-size: 15px; margin-bottom: 5px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-info p { font-size: 12px; color: #aaa; display: flex; gap: 10px; }
        .item-info p span { background: #333; padding: 2px 6px; border-radius: 4px; color: #00e676; }
        
        .action-btns { display: flex; gap: 8px; }
        .icon-btn { background: #333; color: white; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .icon-btn.edit { color: #4dabf7; background: rgba(77, 171, 247, 0.1); }
        .icon-btn.edit:hover { background: #4dabf7; color: white; }
        .icon-btn.delete { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .icon-btn.delete:hover { background: #ff6b6b; color: white; }

        /* === Modal (Pop-up for Edit/Add) === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1e1e1e; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; border-radius: 15px; padding: 25px; border: 1px solid #333; position: relative; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-header h3 { color: #00e676; }
        .close-modal { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
        .close-modal:hover { color: #fff; }

        /* === Form Inputs === */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #121212; border: 1px solid #333; color: white; border-radius: 8px; outline: none; transition: 0.3s; font-size: 14px; }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus { border-color: #00e676; box-shadow: 0 0 5px rgba(0,230,118,0.2); }
        
        .btn-save { width: 100%; padding: 15px; background: #00e676; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { background: #00cc6a; box-shadow: 0 0 15px rgba(0,230,118,0.4); }

        /* === Loader & Toast === */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; color: #00e676; font-size: 20px; font-weight: bold; }
        .loader-overlay i { font-size: 40px; margin-bottom: 15px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; display: none; z-index: 10000; border: 1px solid #444; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: bold; }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="top-nav">
        <button class="nav-btn active" onclick="switchTab('videos')"><i class="fa-solid fa-play"></i> Videos</button>
        <button class="nav-btn" onclick="switchTab('shorts')"><i class="fa-solid fa-bolt"></i> Shorts</button>
        <button class="nav-btn" onclick="switchTab('image')"><i class="fa-solid fa-image"></i> Post/Polls</button>
    </div>

    <!-- Full Screen Loader -->
    <div class="loader-overlay" id="loader">
        <i class="fa-solid fa-satellite-dish fa-beat"></i>
        <span>Connecting to GitHub...</span>
    </div>

    <!-- ==================== MAIN CONTAINERS ==================== -->
    
    <!-- 1. VIDEOS TAB -->
    <div id="videos-tab" class="container active">
        <div class="header-action">
            <h2><i class="fa-solid fa-video"></i> Long Videos</h2>
            <button class="btn-new" onclick="openModal('videos')"><i class="fa-solid fa-plus"></i> Add Video</button>
        </div>
        <div class="item-list" id="videos-list"></div>
    </div>

    <!-- 2. SHORTS TAB -->
    <div id="shorts-tab" class="container">
        <div class="header-action">
            <h2><i class="fa-solid fa-bolt"></i> YouTube Shorts</h2>
            <button class="btn-new" onclick="openModal('shorts')"><i class="fa-solid fa-plus"></i> Add Short</button>
        </div>
        <div class="item-list" id="shorts-list"></div>
    </div>

    <!-- 3. IMAGES & POLLS TAB -->
    <div id="image-tab" class="container">
        <div class="header-action">
            <h2><i class="fa-solid fa-images"></i> Images & Polls</h2>
            <button class="btn-new" onclick="openModal('image')"><i class="fa-solid fa-plus"></i> Add Post</button>
        </div>
        <div class="item-list" id="image-list"></div>
    </div>

    <!-- ==================== UNIVERSAL MODAL FOR EDIT/ADD ==================== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitleText">Add New</h3>
                <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <input type="hidden" id="edit_id"> <!-- ID छुपा कर रखने के लिए -->
            
            <!-- Dynamic Form Container -->
            <div id="dynamicForm"></div>

            <button class="btn-save" onclick="saveData()"><i class="fa-solid fa-floppy-disk"></i> Save & Publish</button>
        </div>
    </div>

    <div class="toast" id="toastMsg">Message Here</div>

    <!-- ==================== JAVASCRIPT LOGIC ==================== -->
    <script>
        // 🚨 अपनी नई चाबी (Token) यहाँ डालें 🚨
        const TOKEN = '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'; 
        const OWNER = 'OurTubeIndia'; 
        const REPO = 'OurTube'; 
        
        let currentTab = 'videos';
        let repoData = { 
            videos: { content: [], sha: '' }, 
            shorts: { content: [], sha: '' },
            image: { content: [], sha: '' } 
        };

        // Base64 Helpers
        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        function showToast(msg, color="#00e676") {
            const t = document.getElementById('toastMsg');
            t.innerText = msg; t.style.color = color; t.style.borderLeft = `4px solid ${color}`; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function showLoader(show, text="Processing...") {
            const l = document.getElementById('loader');
            l.querySelector('span').innerText = text;
            l.style.display = show ? 'flex' : 'none';
        }

        // === TAB SWITCHING ===
        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(repoData[tabId].content.length === 0) fetchFromGithub(tabId);
            else renderList(tabId);
        }

        // === FETCH API ===
        async function fetchFromGithub(type) {
            showLoader(true, `Fetching ${type}...`);
            try {
                let res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${type}.json`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                if(res.ok) {
                    let data = await res.json();
                    repoData[type].sha = data.sha;
                    repoData[type].content = JSON.parse(b64_to_utf8(data.content));
                } else { repoData[type].content = []; } // File missing
                renderList(type);
            } catch(e) { showToast(`Failed to load ${type}!`, "#ff6b6b"); }
            showLoader(false);
        }

        // === RENDER LIST ===
        function renderList(type) {
            const listObj = document.getElementById(type + '-list');
            listObj.innerHTML = '';
            
            repoData[type].content.forEach(item => {
                let badge = type === 'image' ? (item.type === 'poll' ? '📊 Poll' : '🖼️ Image') : `ID: ${item.id}`;
                listObj.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <h4>${item.title || item.desc}</h4>
                            <p><span>${badge}</span> ${item.channelName || ''}</p>
                        </div>
                        <div class="action-btns">
                            <button class="icon-btn edit" onclick="openModal('${type}', '${item.id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('${type}', '${item.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // === DELETE LOGIC ===
        async function deleteItem(type, id) {
            if(!confirm("Are you sure you want to delete this permanently? 🚨")) return;
            repoData[type].content = repoData[type].content.filter(i => i.id !== id);
            await pushToGithub(type, "Deleted Item");
        }

        // === DYNAMIC MODAL (EDIT & ADD) ===
        function openModal(type, id = null) {
            document.getElementById('editModal').classList.add('active');
            document.getElementById('modalTitleText').innerText = id ? `Edit ${type.toUpperCase()}` : `Add New ${type.toUpperCase()}`;
            document.getElementById('edit_id').value = id || ''; // If edit, store ID. If new, empty.

            let item = {};
            if(id) item = repoData[type].content.find(i => i.id === id);

            const form = document.getElementById('dynamicForm');
            form.innerHTML = ''; // Clear old form

            // 1. VIDEOS FORM (Full Control)
            if(type === 'videos') {
                form.innerHTML = `
                    <div class="input-group full-width"><label>Video Title</label><input type="text" id="v_title" value="${item.title || ''}"></div>
                    <div class="input-group full-width"><label>Description</label><textarea id="v_desc" rows="3">${item.desc || ''}</textarea></div>
                    <div class="form-grid">
                        <div class="input-group"><label>Video URL</label><input type="text" id="v_url" value="${item.videoUrl || ''}"></div>
                        <div class="input-group"><label>Thumbnail URL</label><input type="text" id="v_thumb" value="${item.thumbnail || ''}"></div>
                        <div class="input-group"><label>Channel Name</label><input type="text" id="v_cname" value="${item.channelName || 'OurTube Official'}"></div>
                        <div class="input-group"><label>Channel DP</label><input type="text" id="v_cdp" value="${item.channelDp || 'https://randomuser.me/api/portraits/men/32.jpg'}"></div>
                        <div class="input-group"><label>Duration (00:00)</label><input type="text" id="v_dur" value="${item.duration || ''}"></div>
                        <div class="input-group"><label>Views Text</label><input type="text" id="v_views" value="${item.views || '1K views'}"></div>
                        <div class="input-group"><label>Upload Date</label><input type="text" id="v_date" value="${item.date || 'Just now'}"></div>
                        <div class="input-group"><label>Likes (Number)</label><input type="number" id="v_likes" value="${item.likes || 0}"></div>
                    </div>
                `;
            } 
            // 2. SHORTS FORM
            else if(type === 'shorts') {
                form.innerHTML = `
                    <div class="input-group full-width"><label>Short Title</label><input type="text" id="s_title" value="${item.title || ''}"></div>
                    <div class="input-group full-width"><label>Video URL</label><input type="text" id="s_url" value="${item.videoUrl || ''}"></div>
                    <div class="form-grid">
                        <div class="input-group"><label>Channel Name</label><input type="text" id="s_cname" value="${item.channelName || 'OurTube Shorts'}"></div>
                        <div class="input-group"><label>Channel DP</label><input type="text" id="s_cdp" value="${item.channelDp || 'https://randomuser.me/api/portraits/men/32.jpg'}"></div>
                    </div>
                `;
            }
            // 3. IMAGES & POLLS FORM
            else if(type === 'image') {
                form.innerHTML = `
                    <div class="input-group full-width">
                        <label>Post Type</label>
                        <select id="i_type" onchange="toggleImagePollFields()">
                            <option value="image" ${item.type === 'image' ? 'selected' : ''}>Image Post</option>
                            <option value="poll" ${item.type === 'poll' ? 'selected' : ''}>Poll (Voting)</option>
                        </select>
                    </div>
                    <div class="input-group full-width"><label>Title / Question</label><input type="text" id="i_title" value="${item.title || ''}"></div>
                    
                    <div class="input-group full-width" id="img_field"><label>Image URL (Leave empty if no image)</label><input type="text" id="i_thumb" value="${item.thumbnail || ''}"></div>
                    <div class="input-group full-width" id="poll_field" style="display:none;"><label>Poll Options (Comma Separated)</label><input type="text" id="i_options" placeholder="e.g. Yes, No, Maybe" value="${item.options ? item.options.join(',') : ''}"></div>
                    
                    <div class="input-group full-width"><label>Description</label><textarea id="i_desc" rows="2">${item.desc || ''}</textarea></div>
                    
                    <div class="form-grid">
                        <div class="input-group"><label>Channel Name</label><input type="text" id="i_cname" value="${item.channelName || 'OurTube Community'}"></div>
                        <div class="input-group"><label>Channel DP</label><input type="text" id="i_cdp" value="${item.channelDp || 'https://randomuser.me/api/portraits/men/32.jpg'}"></div>
                        <div class="input-group"><label>Date</label><input type="text" id="i_date" value="${item.date || 'Just now'}"></div>
                        <div class="input-group"><label>Likes</label><input type="number" id="i_likes" value="${item.likes || 0}"></div>
                    </div>
                `;
                toggleImagePollFields(); // Set initial visibility
            }
        }

        function toggleImagePollFields() {
            let type = document.getElementById('i_type')?.value;
            if(type === 'poll') { document.getElementById('img_field').style.display = 'none'; document.getElementById('poll_field').style.display = 'block'; }
            else { document.getElementById('img_field').style.display = 'block'; document.getElementById('poll_field').style.display = 'none'; }
        }

        function closeModal() { document.getElementById('editModal').classList.remove('active'); }

        // === SAVE LOGIC (ADD or EDIT) ===
        async function saveData() {
            let id = document.getElementById('edit_id').value;
            let newItem = {};

            if(currentTab === 'videos') {
                newItem = {
                    id: id || "v" + Date.now(),
                    title: document.getElementById('v_title').value,
                    desc: document.getElementById('v_desc').value,
                    videoUrl: document.getElementById('v_url').value,
                    thumbnail: document.getElementById('v_thumb').value,
                    channelName: document.getElementById('v_cname').value,
                    channelDp: document.getElementById('v_cdp').value,
                    duration: document.getElementById('v_dur').value,
                    views: document.getElementById('v_views').value,
                    date: document.getElementById('v_date').value,
                    likes: parseInt(document.getElementById('v_likes').value) || 0,
                    comments: 0
                };
            } else if (currentTab === 'shorts') {
                newItem = {
                    id: id || "short_" + Date.now(),
                    title: document.getElementById('s_title').value,
                    videoUrl: document.getElementById('s_url').value,
                    channelName: document.getElementById('s_cname').value,
                    channelDp: document.getElementById('s_cdp').value
                };
            } else if (currentTab === 'image') {
                let pType = document.getElementById('i_type').value;
                newItem = {
                    id: id || "post_" + Date.now(),
                    type: pType,
                    title: document.getElementById('i_title').value,
                    desc: document.getElementById('i_desc').value,
                    channelName: document.getElementById('i_cname').value,
                    channelDp: document.getElementById('i_cdp').value,
                    date: document.getElementById('i_date').value,
                    likes: parseInt(document.getElementById('i_likes').value) || 0,
                };
                if(pType === 'image') newItem.thumbnail = document.getElementById('i_thumb').value;
                if(pType === 'poll') newItem.options = document.getElementById('i_options').value.split(',').map(s=>s.trim());
            }

            // अगर ID मौजूद है (मतलब Edit है), तो उसे Replace करो
            if(id) {
                let index = repoData[currentTab].content.findIndex(i => i.id === id);
                if(index !== -1) repoData[currentTab].content[index] = newItem;
            } 
            // अगर नई ID है (मतलब Add है), तो सबसे ऊपर Unshift करो
            else {
                repoData[currentTab].content.unshift(newItem);
            }

            closeModal();
            await pushToGithub(currentTab, id ? "Edited Item" : "Added New Item");
        }

        // === PUSH TO GITHUB (SAVE) ===
        async function pushToGithub(type, commitMsg) {
            showLoader(true, "Saving to GitHub Server...");
            let filename = type + '.json';
            let newContent = utf8_to_b64(JSON.stringify(repoData[type].content, null, 2));

            try {
                let res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${filename}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Admin Panel: ${commitMsg} in ${filename}`,
                        content: newContent,
                        sha: repoData[type].sha || undefined 
                    })
                });

                if(res.ok) {
                    let data = await res.json();
                    repoData[type].sha = data.content.sha; // अपडेटेड SHA सेव करें
                    renderList(type);
                    showToast("✅ Successfully Saved to GitHub!");
                } else { showToast("❌ Save Failed! Check Token.", "#ff6b6b"); }
            } catch(e) { showToast("❌ Network Error!", "#ff6b6b"); }
            showLoader(false);
        }

        window.onload = () => fetchFromGithub('videos');
    </script>
</body>
</html>
