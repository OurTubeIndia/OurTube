<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OurTube - Shorts</title>
    
    <!-- असली आइकन्स के लिए -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === बेसिक सेटअप (Shorts के लिए Full Screen) === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background-color: black; color: white; 
            height: 100vh; overflow: hidden; /* बॉडी का स्क्रॉल बंद, सिर्फ कंटेनर स्क्रॉल होगा */
        }

        /* === बैक बटन (Home जाने के लिए) === */
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.5); color: white; width: 40px; height: 40px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            text-decoration: none; font-size: 20px;
        }

        /* === साउंड चालू करने का ओवरले (Unmute Overlay) === */
        .unmute-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.6); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.3s;
        }
        .unmute-overlay i { font-size: 50px; margin-bottom: 15px; animation: bounce 1s infinite alternate; }
        .unmute-overlay p { font-size: 18px; font-weight: bold; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* === मेन शॉर्ट्स कंटेनर (Scroll Snap Magic) === */
        .shorts-container {
            height: 100vh; width: 100%; overflow-y: scroll;
            scroll-snap-type: y mandatory; /* एकदम झटके से एक वीडियो पर रुकेगा */
            scroll-behavior: smooth;
        }
        /* स्क्रॉलबार छुपाने के लिए */
        .shorts-container::-webkit-scrollbar { display: none; }

        /* === एक सिंगल शॉर्ट वीडियो कार्ड === */
        .short-video-wrapper {
            height: 100vh; width: 100vw; position: relative;
            scroll-snap-align: start; /* यहाँ आकर वीडियो रुकेगा */
            display: flex; justify-content: center; align-items: center; background: black;
        }

        video {
            height: 100%; width: 100%; object-fit: cover; /* पूरी स्क्रीन भर देगा */
            cursor: pointer;
        }

        /* बीच का प्ले/पॉज़ आइकॉन (टैप करने पर दिखेगा) */
        .center-action-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; color: rgba(255,255,255,0.7);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .center-action-icon.show { opacity: 1; }

        /* === वीडियो की जानकारी (नीचे बायीं तरफ) === */
        .video-info {
            position: absolute; bottom: 30px; left: 15px; width: 70%; z-index: 10;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .channel-info { display: flex; align-items: center; margin-bottom: 10px; }
        .channel-info img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; border: 1px solid white; }
        .channel-info span { font-weight: bold; font-size: 15px; }
        .video-title { font-size: 14px; margin-bottom: 5px; line-height: 1.4; }

        /* === एक्शन बटन (दाहिनी तरफ) === */
        .action-sidebar {
            position: absolute; bottom: 40px; right: 15px; z-index: 10;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .action-btn {
            display: flex; flex-direction: column; align-items: center;
            background: transparent; border: none; color: white; cursor: pointer;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.8)); transition: 0.2s;
        }
        .action-btn i { font-size: 28px; margin-bottom: 5px; }
        .action-btn.liked i { color: #ff0000; } /* लाइक करने पर लाल */
        .action-btn span { font-size: 12px; font-weight: bold; display: none; /* व्यूज और लाइक छुपा दिए */ }

        /* === प्रोग्रेस बार (सबसे नीचे) === */
        .progress-wrapper {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 15px; z-index: 20;
            display: flex; align-items: flex-end;
        }
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent; margin: 0; padding: 0;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%;
            background: #ff0000; cursor: pointer; margin-top: -3px; opacity: 0; transition: opacity 0.2s;
        }
        .short-video-wrapper:hover input[type=range]::-webkit-slider-thumb { opacity: 1; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.3);
        }

        /* === कमेंट्स का मोडल (Bottom Sheet) === */
        .comments-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70vh;
            background: white; color: black; z-index: 99999;
            border-radius: 20px 20px 0 0; transition: bottom 0.3s ease-in-out;
            display: flex; flex-direction: column;
        }
        .comments-modal.active { bottom: 0; }
        
        .comments-header {
            padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;
        }
        .comments-header h3 { font-size: 16px; }
        .close-comments { background: transparent; border: none; font-size: 20px; cursor: pointer; }
        
        .comments-warning {
            background: #fff3cd; color: #856404; padding: 8px; text-align: center; font-size: 12px; font-weight: bold;
        }

        .comments-list {
            flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px;
        }
        .comment-item { display: flex; gap: 10px; }
        .comment-item img { width: 35px; height: 35px; border-radius: 50%; }
        .comment-text h4 { font-size: 13px; margin-bottom: 3px; color: #555; }
        .comment-text p { font-size: 14px; }

        .comment-input-area {
            padding: 10px 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; background: white;
        }
        .comment-input-area img { width: 35px; height: 35px; border-radius: 50%; }
        .comment-input-area input {
            flex-grow: 1; border: none; background: #f0f0f0; padding: 10px 15px; border-radius: 20px; outline: none;
        }
        .comment-input-area button {
            background: transparent; border: none; color: #065fd4; font-size: 20px; cursor: pointer;
        }

        /* टोस्ट मेसेज */
        .toast-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); color: black; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; font-weight: bold; display: none; z-index: 100000;
        }
    </style>
</head>
<body>

    <!-- 1. होम पेज पर वापस जाने का बटन -->
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>

    <!-- 2. साउंड चालू करने का ओवरले (पहली बार टैप करने के लिए) -->
    <div class="unmute-overlay" id="unmuteOverlay" onclick="enableSound()">
        <i class="fa-solid fa-volume-high"></i>
        <p>आवाज़ चालू करने के लिए स्क्रीन पर टैप करें 👆</p>
    </div>

    <!-- 3. मेन शॉर्ट्स फीड -->
    <div class="shorts-container" id="shortsFeed">
        <!-- यहाँ JS से वीडियो आएंगे -->
        <h3 style="text-align: center; margin-top: 50vh; color: white;">लोड हो रहा है...</h3>
    </div>

    <!-- 4. कमेंट्स मोडल (नीचे से खुलेगा) -->
    <div class="comments-modal" id="commentsModal">
        <div class="comments-header">
            <h3>Comments</h3>
            <button class="close-comments" onclick="closeComments()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="comments-warning">
            ⚠️ कृपया भद्दे या गलत शब्दों का प्रयोग न करें। सभ्य भाषा का उपयोग करें।
        </div>
        
        <div class="comments-list" id="commentsList">
            <!-- कमेंट्स यहाँ दिखेंगे -->
        </div>

        <div class="comment-input-area">
            <img src="https://randomuser.me/api/portraits/lego/1.jpg" alt="You">
            <input type="text" id="newCommentInput" placeholder="Add a comment...">
            <button onclick="postComment()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="toast-msg" id="toastMsg">Message</div>

    <script>
        let allShorts = [];
        let isGlobalMuted = true; // शुरुआत में म्यूट रहेगा ब्राउज़र की वजह से
        let activeVideoElement = null; // जो वीडियो अभी चल रहा है
        let currentShortId = null; // जिस वीडियो का कमेंट खुला है

        // 1. GitHub से शॉर्ट्स डेटा लाना 🌐
        async function fetchShorts() {
            try {
                // तुम्हारी दी हुई JSON लिंक
                const response = await fetch('https://raw.githubusercontent.com/OurTubeIndia/OurTube/refs/heads/main/shorts.json');
                if(!response.ok) throw new Error("डेटा नहीं मिला");
                
                let data = await response.json();
                allShorts = data.sort(() => 0.5 - Math.random()); // Random कर दिया
                renderShorts(allShorts);
            } catch (error) {
                console.log("बैकअप वीडियो चला रहे हैं...", error);
                allShorts = [
                    {
                        id: "s1", title: "Testing OurTube Shorts 🔥", 
                        videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
                        channelName: "OurTube Dev", channelDp: "https://randomuser.me/api/portraits/men/5.jpg"
                    },
                    {
                        id: "s2", title: "Swag desi style! 😎", 
                        videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
                        channelName: "Desi Boy", channelDp: "https://randomuser.me/api/portraits/men/8.jpg"
                    }
                ];
                renderShorts(allShorts);
            }
        }

        // 2. शॉर्ट्स को स्क्रीन पर बनाना 📺
        function renderShorts(videos) {
            const feed = document.getElementById('shortsFeed');
            feed.innerHTML = '';

            videos.forEach((vidData, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'short-video-wrapper';

                wrapper.innerHTML = `
                    <video src="${vidData.videoUrl}" loop muted playsinline data-id="${vidData.id}"></video>
                    
                    <div class="center-action-icon"><i class="fa-solid fa-play"></i></div>

                    <div class="video-info">
                        <div class="channel-info">
                            <img src="${vidData.channelDp || 'https://randomuser.me/api/portraits/lego/1.jpg'}">
                            <span>@${vidData.channelName || 'user'}</span>
                        </div>
                        <p class="video-title">${vidData.title}</p>
                    </div>

                    <div class="action-sidebar">
                        <button class="action-btn like-btn" onclick="toggleLike('${vidData.id}', this)">
                            <i class="fa-solid fa-thumbs-up"></i>
                        </button>
                        <button class="action-btn" onclick="openComments('${vidData.id}')">
                            <i class="fa-solid fa-comment-dots"></i>
                        </button>
                        <button class="action-btn" onclick="shareShort('${vidData.videoUrl}')">
                            <i class="fa-solid fa-share"></i>
                        </button>
                        <a href="${vidData.videoUrl}" download class="action-btn" style="text-decoration: none;">
                            <i class="fa-solid fa-download"></i>
                        </a>
                    </div>

                    <div class="progress-wrapper">
                        <input type="range" class="short-progress" min="0" max="100" value="0" step="0.1">
                    </div>
                `;

                feed.appendChild(wrapper);

                const videoElement = wrapper.querySelector('video');
                const centerIcon = wrapper.querySelector('.center-action-icon');
                const progressBar = wrapper.querySelector('.short-progress');
                const likeBtn = wrapper.querySelector('.like-btn');

                // शुरुआत में लाइक चेक करो
                let likedShorts = JSON.parse(localStorage.getItem('ourtube_shorts_likes') || '[]');
                if(likedShorts.includes(vidData.id)) {
                    likeBtn.classList.add('liked');
                }

                // वीडियो पर टैप करने से Play/Pause
                videoElement.addEventListener('click', () => {
                    if(videoElement.paused) {
                        videoElement.play();
                        showIcon(centerIcon, 'fa-play');
                    } else {
                        videoElement.pause();
                        showIcon(centerIcon, 'fa-pause');
                    }
                });

                // प्रोग्रेस बार अपडेट (Scrubbing)
                videoElement.addEventListener('timeupdate', () => {
                    if(videoElement.duration) {
                        const percent = (videoElement.currentTime / videoElement.duration) * 100;
                        progressBar.value = percent;
                        progressBar.style.background = `linear-gradient(to right, #ff0000 ${percent}%, rgba(255,255,255,0.3) ${percent}%)`;
                    }
                });

                // यूज़र प्रोग्रेस बार खींचे तो आगे-पीछे हो
                progressBar.addEventListener('input', (e) => {
                    const seekTime = (e.target.value / 100) * videoElement.duration;
                    videoElement.currentTime = seekTime;
                });
            });

            setupIntersectionObserver(); // Autoplay का जादू यहाँ से शुरू होगा
        }

        // 3. प्ले/पॉज़ आइकॉन एनीमेशन ⏯️
        function showIcon(element, iconClass) {
            element.innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
            element.classList.add('show');
            setTimeout(() => { element.classList.remove('show'); }, 500);
        }

        // 4. पहला टैप: साउंड चालू करना 🔊
        function enableSound() {
            isGlobalMuted = false;
            document.getElementById('unmuteOverlay').style.display = 'none'; // ओवरले हटाओ
            if(activeVideoElement) {
                activeVideoElement.muted = false; // जो चल रहा है उसकी आवाज़ खोल दो
            }
        }

        // 5. स्वाइप (Scroll) करने पर Autoplay का लॉजिक (Intersection Observer) 📱
        function setupIntersectionObserver() {
            const videos = document.querySelectorAll('video');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target;
                    if (entry.isIntersecting) {
                        // जब वीडियो स्क्रीन पर आए
                        vid.currentTime = 0; // शुरू से चलाओ
                        vid.muted = isGlobalMuted; // अगर यूज़र ने टैप किया है तो आवाज़ आएगी
                        vid.play().catch(e => console.log("ऑटोप्ले ब्लॉक हुआ"));
                        activeVideoElement = vid;
                    } else {
                        // जब वीडियो स्क्रीन से हट जाए
                        vid.pause();
                    }
                });
            }, { threshold: 0.6 }); // जब 60% वीडियो दिखे तब चलाओ

            videos.forEach(vid => observer.observe(vid));
        }

        // 6. लाइक सिस्टम (बिना नंबर दिखाए, लोकल स्टोरेज में सेव) 👍
        function toggleLike(videoId, btnElement) {
            let likedShorts = JSON.parse(localStorage.getItem('ourtube_shorts_likes') || '[]');
            
            if(likedShorts.includes(videoId)) {
                likedShorts = likedShorts.filter(id => id !== videoId);
                btnElement.classList.remove('liked');
            } else {
                likedShorts.push(videoId);
                btnElement.classList.add('liked');
                showToast("❤️ Liked!");
            }
            localStorage.setItem('ourtube_shorts_likes', JSON.stringify(likedShorts));
        }

        // 7. शेयर सिस्टम 🚀
        function shareShort(url) {
            if (navigator.share) {
                navigator.share({ title: 'OurTube Shorts', url: url }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(url);
                showToast("लिंक कॉपी हो गया! 📋");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // === 8. कमेंट्स का सिस्टम (Local Storage) 💬 ===
        function openComments(videoId) {
            currentShortId = videoId;
            document.getElementById('commentsModal').classList.add('active');
            loadComments();
        }

        function closeComments() {
            document.getElementById('commentsModal').classList.remove('active');
            document.getElementById('newCommentInput').value = '';
        }

        function loadComments() {
            const list = document.getElementById('commentsList');
            list.innerHTML = '';
            
            // इस वीडियो के कमेंट्स लाओ
            let comments = JSON.parse(localStorage.getItem('ourtube_comments_' + currentShortId) || '[]');
            
            if(comments.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#888; margin-top:20px;">अभी कोई कमेंट नहीं है। पहला कमेंट करें!</p>';
                return;
            }

            comments.forEach(c => {
                list.innerHTML += `
                    <div class="comment-item">
                        <img src="https://randomuser.me/api/portraits/lego/1.jpg">
                        <div class="comment-text">
                            <h4>You <span style="font-size:10px; color:#aaa; font-weight:normal;">• Just now</span></h4>
                            <p>${c}</p>
                        </div>
                    </div>
                `;
            });
            // स्क्रॉल को सबसे नीचे रखो
            list.scrollTop = list.scrollHeight;
        }

        function postComment() {
            const input = document.getElementById('newCommentInput');
            const text = input.value.trim();
            if(!text) return;

            let comments = JSON.parse(localStorage.getItem('ourtube_comments_' + currentShortId) || '[]');
            comments.push(text);
            localStorage.setItem('ourtube_comments_' + currentShortId, JSON.stringify(comments));
            
            input.value = '';
            loadComments(); // कमेंट लिस्ट अपडेट करो
        }

        // लोड होते ही वीडियो मंगाओ
        window.onload = fetchShorts;

    </script>
</body>
</html>
